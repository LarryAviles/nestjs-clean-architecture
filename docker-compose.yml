services:
  db:
    image: postgres:16-alpine
    container_name: project-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - project-db-data:/var/lib/postgresql/data

volumes:
  project-db-data:
